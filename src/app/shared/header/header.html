<header class="header">

  <div class="left">

    <button
      class="menu-btn"
      (click)="abrirMenu()">

      <i class="bi bi-list"></i>

    </button>

    <img
      src="/images/ford.png"
      class="logo"
      alt="Ford">

    <span class="title">
      Ford Enter
    </span>

  </div>

  <div class="right">

    <div class="user">

      <i class="bi bi-person-circle"></i>

      <span>Administrador</span>

    </div>

    <button
      routerLink="/login"
      class="logout">

      <i class="bi bi-box-arrow-right"></i>

      Logout

    </button>

  </div>

</header>

<nav
  class="side-menu"
  [class.open]="menuOpen">

  <a
    routerLink="/home"
    (click)="abrirMenu()">

    <i class="bi bi-house-door"></i>

    Home

  </a>

  <a
    routerLink="/dashboard"
    (click)="abrirMenu()">

    <i class="bi bi-speedometer2"></i>

    Dashboard

  </a>

  <hr>

  <a
    routerLink="/login"
    (click)="abrirMenu()">

    <i class="bi bi-box-arrow-right"></i>

    Logout

  </a>

</nav>

<div
  class="overlay"
  *ngIf="menuOpen"
  (click)="abrirMenu()">

</div>
